name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (erros apenas — imports não usados, variáveis indefinidas)
        run: ruff check . --select F

      - name: Testes
        run: pytest tests/ -q
